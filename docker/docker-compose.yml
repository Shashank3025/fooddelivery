services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always
    networks:
      - default

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always
    networks:
      - default

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: foodservice
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: always
    networks:
      - default

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - default

  user-service:
    build: ../user-service
    container_name: user-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice?allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: always
    networks:
      - default

  restaurant-service:
    build: ../restaurant-service
    container_name: restaurant-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice?allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: always
    networks:
      - default

  order-service:
    build: ../order-service
    container_name: order-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice?allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: always
    networks:
      - default

  payment-service:
    build: ../payment-service
    container_name: payment-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice?allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: always
    networks:
      - default

  delivery-service:
    build: ../delivery-service
    container_name: delivery-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice?allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: always
    networks:
      - default

  notification-service:
    build: ../notification-service
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: always
    networks:
      - default

  agent-service:
    build: ../agent-service
    container_name: agent-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice?allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: always
    networks:
      - default

  cart-service:
    build: ../cart-service
    container_name: cart-service
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      DB_URL: jdbc:mysql://mysql:3306/foodservice?allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: always
    networks:
      - default

  api-gateway:
    build: ../api-gateway
    container_name: api-gateway
    command: ["sh", "-c", "sleep 75 && java -jar app.jar"]
    depends_on:
      user-service:
        condition: service_started
      restaurant-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      delivery-service:
        condition: service_started
      notification-service:
        condition: service_started
      agent-service:
        condition: service_started
      cart-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    restart: always
    networks:
      - default

volumes:
  mysql_data:

networks:
  default:
    driver: bridge