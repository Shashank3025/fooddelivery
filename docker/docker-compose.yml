services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always
    networks:
      - default

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always
    networks:
      - default

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: foodservice
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always
    networks:
      - default

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: always
    networks:
      - default

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    restart: always
    networks:
      - default

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    restart: always
    networks:
      - default

  user-service:
    build: ../user-service
    container_name: user-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice?allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_BASE_URL: http://zipkin:9411
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    restart: always
    networks:
      - default

  restaurant-service:
    build: ../restaurant-service
    container_name: restaurant-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_BASE_URL: http://zipkin:9411
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    restart: always
    networks:
      - default

  order-service:
    build: ../order-service
    container_name: order-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_BASE_URL: http://zipkin:9411
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    restart: always
    networks:
      - default

  payment-service:
    build: ../payment-service
    container_name: payment-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_BASE_URL: http://zipkin:9411
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    restart: always
    networks:
      - default

  delivery-service:
    build: ../delivery-service
    container_name: delivery-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_BASE_URL: http://zipkin:9411
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    restart: always
    networks:
      - default

  notification-service:
    build: ../notification-service
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_BASE_URL: http://zipkin:9411
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    restart: always
    networks:
      - default

  agent-service:
    build: ../agent-service
    container_name: agent-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/foodservice
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ZIPKIN_BASE_URL: http://zipkin:9411
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    restart: always
    networks:
      - default

  api-gateway:
    build: ../api-gateway
    container_name: api-gateway
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - payment-service
      - delivery-service
      - notification-service
      - agent-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      FRONTEND_ORIGIN: http://13.220.221.12
      ZIPKIN_BASE_URL: http://zipkin:9411
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8080:8080"
    restart: always
    networks:
      - default

volumes:
  mysql_data:

networks:
  default:
    driver: bridge