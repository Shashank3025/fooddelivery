spring.application.name=delivery-service
server.port=8085

# MySQL datasource (correct for Docker)
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/foodservice
spring.datasource.username=root
spring.datasource.password=Shashank@2530
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Kafka Producer (sending delivery-events)
spring.kafka.producer.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka Consumer (listening to payment-events)
spring.kafka.consumer.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=delivery-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Zipkin (correct for Docker)
spring.zipkin.base-url=http://zipkin:9411
spring.sleuth.sampler.probability=1.0

# Logging inside container
logging.file.name=/app/logs/app.log