spring.application.name=delivery-service
server.port=8085

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/foodservice
spring.datasource.username=root
spring.datasource.password=Shashank@2530
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Kafka producer (sending order-events)
spring.kafka.producer.bootstrap-servers=host.docker.internal:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Optional: Kafka consumer settings if you want to consume in this service later
# spring.kafka.consumer.bootstrap-servers=host.docker.internal:9092
# spring.kafka.consumer.group-id=order-group
# spring.kafka.consumer.auto-offset-reset=earliest
# spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Zipkin
spring.zipkin.base-url=http://localhost:9411
spring.sleuth.sampler.probability=1.0

# Logging (ELK)
logging.level.root=INFO

logging.file.name=C:/Users/shash/Documents/deliveryfood/docker/logs/app.log

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans