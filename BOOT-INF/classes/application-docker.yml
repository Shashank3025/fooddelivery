server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-Configurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://rushank.duckdns.org"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: false

      routes:
        - id: cart-service
          uri: http://cart-service:8091
          predicates:
            - Path=/api/cart/**
          filters:
            - RewritePath=/api/cart/(?<segment>.*), /cart/${segment}

        - id: agent-service
          uri: http://agent-service:8088
          predicates:
            - Path=/api/agent,/api/agent/**
          filters:
            - RewritePath=/api/agent/?(?<segment>.*), /agent/$\{segment}

        - id: ai-agent-service
          uri: http://agent-service:8088
          predicates:
            - Path=/api/ai-agent,/api/ai-agent/**
          filters:
            - RewritePath=/api/ai-agent/?(?<segment>.*), /ai-agent/$\{segment}

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - RewritePath=/api/users/?(?<segment>.*), /users/$\{segment}

        - id: restaurant-service
          uri: http://restaurant-service:8082
          predicates:
            - Path=/api/restaurants,/api/restaurants/**
          filters:
            - RewritePath=/api/restaurants/?(?<segment>.*), /restaurants/$\{segment}

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders,/api/orders/**
          filters:
            - RewritePath=/api/orders/?(?<segment>.*), /orders/$\{segment}

        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments,/api/payments/**
          filters:
            - RewritePath=/api/payments/?(?<segment>.*), /payments/$\{segment}

        - id: delivery-service
          uri: http://delivery-service:8085
          predicates:
            - Path=/api/delivery,/api/delivery/**
          filters:
            - RewritePath=/api/delivery/?(?<segment>.*), /delivery/$\{segment}

        - id: notification-service
          uri: http://notification-service:8086
          predicates:
            - Path=/api/notifications,/api/notifications/**
          filters:
            - RewritePath=/api/notifications/?(?<segment>.*), /notifications/$\{segment}

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    org.springframework.web.cors: DEBUG