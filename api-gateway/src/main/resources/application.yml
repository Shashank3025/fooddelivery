server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # ✅ ORDER SERVICE
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders, /api/orders/**
          filters:
            - RewritePath=/api/orders/?(?<segment>.*), /orders${segment}

        # ✅ PAYMENT SERVICE
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments, /api/payments/**
          filters:
            - RewritePath=/api/payments/?(?<segment>.*), /payments${segment}

        # ✅ DELIVERY SERVICE
        - id: delivery-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/delivery, /api/delivery/**
          filters:
            - RewritePath=/api/delivery/?(?<segment>.*), /delivery${segment}