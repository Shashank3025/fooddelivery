server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users, /api/users/**

        - id: restaurant-service
          uri: http://localhost:8082
          predicates:
            - Path=/restaurants, /restaurants/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders, /api/orders/**
          filters:
            - RewritePath=/api/orders/?(?<segment>.*), /orders/${segment}

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments, /api/payments/**
          filters:
            - RewritePath=/api/payments/?(?<segment>.*), /payments/${segment}

        - id: delivery-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/delivery, /api/delivery/**
          filters:
            - RewritePath=/api/delivery/?(?<segment>.*), /delivery/${segment}